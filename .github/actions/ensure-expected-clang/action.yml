name: Ensure expected Clang
description: Populate missing repo-expected Clang prebuilts for experimental builds.
inputs:
  enabled:
    required: true
    default: "false"
    description: Enable experimental Clang materialization.
  kernel_version:
    required: true
    description: Selected kernel version for this build.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -eo pipefail

        if [ "${{ inputs.enabled }}" != "true" ]; then
          echo "ensure-expected-clang: disabled"
          exit 0
        fi

        KERNEL_ROOT="$GITHUB_WORKSPACE/kernel"
        METADATA_FILE="$GITHUB_WORKSPACE/compiler-version.txt"
        CLANG_PREBUILT_REPO="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86"
        FALLBACK_CACHE_ROOT="$KERNEL_ROOT/.coreshift-toolchains"
        METADATA_CHECKOUT="$FALLBACK_CACHE_ROOT/linux-x86-metadata"
        FALLBACK_CHECKOUT="$FALLBACK_CACHE_ROOT/linux-x86-fallback"
        PREFERRED_FALLBACK_CLANG="clang-r584948"
        METADATA_REPO_REVISION=""
        METADATA_REPO_SOURCE="unset"
        FALLBACK_REPO_SOURCE="unset"
        FALLBACK_SOURCE_CLANG_NAME=""

        mkdir -p "$FALLBACK_CACHE_ROOT"
        touch "$METADATA_FILE"

        declare -a expected_bins=()
        declare -a expected_dirs=()
        declare -a expected_project_roots=()
        declare -a expected_clang_dirnames=()
        declare -a existing_dirs=()
        declare -a materialized_dirs=()
        declare -a path_exports=()
        declare -a clang_project_excluded_states=()
        declare -a fallback_used_dirs=()
        declare -a recreated_kleaf_metadata_states=()

        add_unique() {
          local value="$1"
          shift
          local -n target_ref="$1"
          local current

          [ -n "$value" ] || return

          for current in "${target_ref[@]:-}"; do
            [ "$current" != "$value" ] || return
          done

          target_ref+=("$value")
        }

        add_expected_bin() {
          local bin_path="$1"

          [ -n "$bin_path" ] || return
          if [[ "$bin_path" != "$KERNEL_ROOT/"* ]]; then
            bin_path="$KERNEL_ROOT/$bin_path"
          fi

          add_unique "$(readlink -m "$bin_path")" expected_bins
        }

        detect_metadata_repo_revision() {
          local manifest_file="$KERNEL_ROOT/.repo/manifests/default.xml"
          local project_line=""

          if [ ! -f "$manifest_file" ]; then
            echo "::warning::missing repo manifest: $manifest_file"
          else
            project_line="$(
              grep -E '<project[^>]*(name="platform/prebuilts/clang/host/linux-x86"|path="prebuilts/clang/host/linux-x86"|path="prebuilts-master/clang/host/linux-x86")' \
                "$manifest_file" |
              head -n 1 || true
            )"

            METADATA_REPO_REVISION="$(
              sed -n 's#.*revision="\([^"]*\)".*#\1#p' <<< "$project_line" | head -n 1
            )"

            if [ -z "$METADATA_REPO_REVISION" ]; then
              METADATA_REPO_REVISION="$(
                sed -n 's#.*<default[^>]*revision="\([^"]*\)".*#\1#p' "$manifest_file" | head -n 1
              )"
            fi

            if [ -n "$METADATA_REPO_REVISION" ]; then
              METADATA_REPO_SOURCE="manifest"
            fi
          fi

          if [ -z "$METADATA_REPO_REVISION" ] && command -v repo >/dev/null 2>&1; then
            METADATA_REPO_REVISION="$(
              (
                cd "$KERNEL_ROOT"
                repo manifest -r 2>/dev/null || true
              ) |
                grep -E '<project[^>]*(name="platform/prebuilts/clang/host/linux-x86"|path="prebuilts/clang/host/linux-x86"|path="prebuilts-master/clang/host/linux-x86")' |
                sed -n 's#.*revision="\([^"]*\)".*#\1#p' |
                head -n 1
            )"
            if [ -n "$METADATA_REPO_REVISION" ]; then
              METADATA_REPO_SOURCE="repo-manifest"
            fi
          fi

          if [ -z "$METADATA_REPO_REVISION" ]; then
            METADATA_REPO_REVISION="${BRANCH:-}"
            METADATA_REPO_SOURCE="branch-fallback"
          fi

          if [ -z "$METADATA_REPO_REVISION" ]; then
            echo "::error::could not determine Clang prebuilt metadata revision from $manifest_file or BRANCH"
            exit 1
          fi
        }

        discover_expected_dirs() {
          local clang_bin
          local clang_dir
          local clang_project_root
          local clang_dirname

          for clang_bin in "${expected_bins[@]}"; do
            clang_dir="$(dirname "$(dirname "$clang_bin")")"
            clang_project_root="$(dirname "$clang_dir")"
            clang_dirname="$(basename "$clang_dir")"

            add_unique "$clang_dir" expected_dirs
            add_unique "$clang_project_root" expected_project_roots
            add_unique "$clang_dirname" expected_clang_dirnames
          done
        }

        materialize_metadata_checkout() {
          local expected_dirname="$1"
          local sparse_args=()
          local root_entry

          if [ -z "$METADATA_REPO_REVISION" ]; then
            detect_metadata_repo_revision
          fi

          sparse_args=(
            "/BUILD"
            "/BUILD.bazel"
            "/kleaf"
            "/kleaf/**"
            "/MODULE.bazel"
            "/WORKSPACE"
            "/WORKSPACE.bazel"
            "/*.bzl"
            "/$expected_dirname"
            "/$expected_dirname/**"
          )

          rm -rf "$METADATA_CHECKOUT"
          git clone \
            --depth=1 \
            --branch "$METADATA_REPO_REVISION" \
            --filter=blob:none \
            --sparse \
            "$CLANG_PREBUILT_REPO" \
            "$METADATA_CHECKOUT"
          git -C "$METADATA_CHECKOUT" sparse-checkout set --no-cone "${sparse_args[@]}"

          echo "metadata checkout root: $METADATA_CHECKOUT"
          echo "metadata checkout revision: $METADATA_REPO_REVISION"
          echo "metadata checkout source: $METADATA_REPO_SOURCE"
          echo "metadata checkout files:"
          for root_entry in BUILD BUILD.bazel MODULE.bazel WORKSPACE WORKSPACE.bazel; do
            if [ -e "$METADATA_CHECKOUT/$root_entry" ]; then
              echo "  $root_entry"
            fi
          done
          if [ -d "$METADATA_CHECKOUT/kleaf" ]; then
            echo "  kleaf/"
          fi
        }

        materialize_fallback_checkout() {
          local sparse_args=(
            "/$PREFERRED_FALLBACK_CLANG"
            "/$PREFERRED_FALLBACK_CLANG/**"
          )

          rm -rf "$FALLBACK_CHECKOUT"
          git clone \
            --depth=1 \
            --filter=blob:none \
            --sparse \
            "$CLANG_PREBUILT_REPO" \
            "$FALLBACK_CHECKOUT"
          git -C "$FALLBACK_CHECKOUT" sparse-checkout set --no-cone "${sparse_args[@]}"

          if [ ! -x "$FALLBACK_CHECKOUT/$PREFERRED_FALLBACK_CLANG/bin/clang" ]; then
            echo "::error::no suitable fallback Clang found: $PREFERRED_FALLBACK_CLANG"
            echo "::error::available fallback dirs:"
            git -C "$FALLBACK_CHECKOUT" ls-tree --name-only -d HEAD | grep '^clang-' | head -40 || true
            exit 1
          fi

          FALLBACK_REPO_SOURCE="repo-default-head"
          FALLBACK_SOURCE_CLANG_NAME="$PREFERRED_FALLBACK_CLANG"

          echo "fallback compiler checkout root: $FALLBACK_CHECKOUT"
          echo "fallback compiler checkout source: $FALLBACK_REPO_SOURCE"
          echo "fallback source clang: $FALLBACK_SOURCE_CLANG_NAME"
        }

        install_toolchain_package() {
          local metadata_root="$1"
          local dst_root="$2"
          local expected_dir="$3"
          local root_entry
          local root_file
          local expected_dirname
          local fallback_dir
          local expected_clang_bin

          expected_dirname="$(basename "$expected_dir")"
          fallback_dir="$FALLBACK_CHECKOUT/$PREFERRED_FALLBACK_CLANG"
          expected_clang_bin="$expected_dir/bin/clang"

          rm -rf "$dst_root"
          mkdir -p "$dst_root"

          if [ "${BUILD_ENGINE:-}" = "kleaf" ]; then
            for root_entry in BUILD BUILD.bazel MODULE.bazel WORKSPACE WORKSPACE.bazel; do
              if [ -e "$metadata_root/$root_entry" ]; then
                cp -a "$metadata_root/$root_entry" "$dst_root/$root_entry"
              fi
            done

            for root_file in "$metadata_root"/*.bzl; do
              if [ -e "$root_file" ]; then
                cp -a "$root_file" "$dst_root/"
              fi
            done

            if [ -d "$metadata_root/kleaf" ]; then
              cp -a "$metadata_root/kleaf" "$dst_root/kleaf"
            fi
            mkdir -p "$dst_root/kleaf"
            if [ ! -f "$dst_root/kleaf/BUILD" ] && [ ! -f "$dst_root/kleaf/BUILD.bazel" ]; then
              {
                echo "# Package marker for fallback Kleaf Clang toolchain metadata."
              } > "$dst_root/kleaf/BUILD.bazel"
            fi
          fi

          if [ -x "$metadata_root/$expected_dirname/bin/clang" ]; then
            cp -a "$metadata_root/$expected_dirname" "$expected_dir"
            FALLBACK_REPO_SOURCE="metadata-checkout"
            FALLBACK_SOURCE_CLANG_NAME="$expected_dirname"
          else
            materialize_fallback_checkout
            if [ ! -d "$fallback_dir" ]; then
              echo "::error::fallback Clang directory missing: $fallback_dir"
              exit 1
            fi
            cp -a "$fallback_dir" "$expected_dir"
          fi
        }

        kleaf_bzl_is_referenced() {
          local bzl_file="$1"

          grep -R -q -E \
            "prebuilts/clang/host/linux-x86/kleaf:${bzl_file}|load\(.*kleaf.*${bzl_file}" \
            "$KERNEL_ROOT/build" "$KERNEL_ROOT/MODULE.bazel" 2>/dev/null
        }

        kleaf_metadata_complete() {
          local project_root="$1"

          [ "${BUILD_ENGINE:-}" = "kleaf" ] || return 0

          if kleaf_bzl_is_referenced "register\\.bzl" &&
            [ ! -f "$project_root/kleaf/register.bzl" ]; then
            return 1
          fi

          if kleaf_bzl_is_referenced "clang_toolchain_repository\\.bzl" &&
            [ ! -f "$project_root/kleaf/clang_toolchain_repository.bzl" ]; then
            return 1
          fi

          return 0
        }

        print_kleaf_metadata_diagnostics() {
          local project_root="$1"

          [ "${BUILD_ENGINE:-}" = "kleaf" ] || return 0

          echo "== Kleaf Clang metadata refs expected by build =="
          grep -R -nE 'prebuilts/clang/host/linux-x86/kleaf:.*\.bzl|load\(.*kleaf' \
            "$KERNEL_ROOT/build" "$KERNEL_ROOT/MODULE.bazel" 2>/dev/null || true

          echo "== recreated kleaf metadata files =="
          find "$project_root/kleaf" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort || true
        }

        validate_toolchain_package() {
          local project_root="$1"
          local clang_bin="$2"

          if [ ! -x "$clang_bin" ]; then
            echo "::error::expected clang missing or not executable: $clang_bin"
            exit 1
          fi

          if [ "${BUILD_ENGINE:-}" != "kleaf" ]; then
            return
          fi

          mkdir -p "$project_root/kleaf"
          if [ ! -f "$project_root/kleaf/BUILD" ] && [ ! -f "$project_root/kleaf/BUILD.bazel" ]; then
            {
              echo "# Package marker for fallback Kleaf Clang toolchain metadata."
            } > "$project_root/kleaf/BUILD.bazel"
          fi

          if [ ! -f "$project_root/kleaf/BUILD" ] && [ ! -f "$project_root/kleaf/BUILD.bazel" ]; then
            echo "::error::missing Kleaf package marker: $project_root/kleaf/BUILD or BUILD.bazel"
            exit 1
          fi

          if kleaf_bzl_is_referenced "register\\.bzl" &&
            [ ! -f "$project_root/kleaf/register.bzl" ]; then
            echo "::error::missing branch-required Kleaf metadata: $project_root/kleaf/register.bzl"
            exit 1
          fi

          if kleaf_bzl_is_referenced "clang_toolchain_repository\\.bzl" &&
            [ ! -f "$project_root/kleaf/clang_toolchain_repository.bzl" ]; then
            echo "::error::missing Kleaf toolchain metadata: $project_root/kleaf/clang_toolchain_repository.bzl"
            exit 1
          fi

          print_kleaf_metadata_diagnostics "$project_root"
        }

        detect_legacy_expected_bin() {
          local clang_prebuilt_bin=""

          if ! compgen -G "$GITHUB_WORKSPACE/kernel/common/build.config*" >/dev/null; then
            echo "::error::missing legacy build configs: $GITHUB_WORKSPACE/kernel/common/build.config*"
            exit 1
          fi

          clang_prebuilt_bin="$(
            grep -R -h -E '^[[:space:]]*(export[[:space:]]+)?CLANG_PREBUILT_BIN=' \
              "$GITHUB_WORKSPACE/kernel/common"/build.config* 2>/dev/null |
            sed -E \
              -e 's/^[[:space:]]*(export[[:space:]]+)?CLANG_PREBUILT_BIN=//' \
              -e 's/[[:space:]]+#.*$//' \
              -e 's/^["'\''"]//' \
              -e 's/["'\''"]$//' |
            tail -n 1 || true
          )"

          if [ -z "$clang_prebuilt_bin" ]; then
            echo "::error::CLANG_PREBUILT_BIN not found in legacy build configs"
            exit 1
          fi

          add_expected_bin "$clang_prebuilt_bin/clang"
        }

        detect_kleaf_expected_bin() {
          local constants_file="$KERNEL_ROOT/common/build.config.constants"
          local clang_version=""

          if [ ! -f "$constants_file" ]; then
            echo "::error::missing Kleaf build config constants: $constants_file"
            exit 1
          fi

          clang_version="$(
            sed -n 's/^[[:space:]]*CLANG_VERSION=//p' "$constants_file" | tail -n 1
          )"

          clang_version="${clang_version%\"}"
          clang_version="${clang_version#\"}"
          clang_version="${clang_version%\'}"
          clang_version="${clang_version#\'}"
          clang_version="${clang_version%%[[:space:]]*}"

          if [[ ! "$clang_version" =~ ^r[0-9a-z]+$ ]]; then
            echo "::error::invalid or missing CLANG_VERSION in $constants_file: ${clang_version:-unset}"
            exit 1
          fi

          add_expected_bin "prebuilts/clang/host/linux-x86/clang-${clang_version}/bin/clang"
        }

        print_tool_versions() {
          local clang_bin="$1"
          local lld_bin

          lld_bin="$(dirname "$clang_bin")/ld.lld"

          echo "clang candidate: $clang_bin"
          "$clang_bin" --version | head -n 1 || true
          if [ -x "$lld_bin" ]; then
            "$lld_bin" --version | head -n 1 || true
          fi
        }

        if [ "$BUILD_ENGINE" = "legacy" ]; then
          detect_legacy_expected_bin
        else
          detect_kleaf_expected_bin
        fi

        if [ "${#expected_bins[@]}" -eq 0 ]; then
          echo "::error::could not detect any expected Clang prebuilt paths"
          exit 1
        fi

        discover_expected_dirs

        echo "== expected clang bins =="
        printf '%s\n' "${expected_bins[@]}"

        for clang_bin in "${expected_bins[@]}"; do
          clang_dir="$(dirname "$(dirname "$clang_bin")")"
          clang_project_root="$(dirname "$clang_dir")"
          clang_project_rel="${clang_project_root#$KERNEL_ROOT/}"
          clang_dirname="$(basename "$clang_dir")"
          bin_dir="$(dirname "$clang_bin")"
          original_project_excluded="unknown"

          if [ -f "$KERNEL_ROOT/.repo/project.list" ]; then
            if grep -Fxq "$clang_project_rel" "$KERNEL_ROOT/.repo/project.list"; then
              original_project_excluded="no"
            else
              original_project_excluded="yes"
            fi
          fi
          add_unique "$original_project_excluded" clang_project_excluded_states

          if [ -x "$clang_bin" ]; then
            if kleaf_metadata_complete "$clang_project_root"; then
              validate_toolchain_package "$clang_project_root" "$clang_bin"
              add_unique "$clang_dir" existing_dirs
              add_unique "$bin_dir" path_exports
              echo "clang state: existing -> $clang_dir"
              print_tool_versions "$clang_bin"
              continue
            fi

            echo "clang state: existing compiler with incomplete Kleaf metadata -> $clang_dir"
          fi

          fallback_dir=""
          materialize_metadata_checkout "$clang_dirname"

          install_toolchain_package "$METADATA_CHECKOUT" "$clang_project_root" "$clang_dir"
          fallback_dir="$FALLBACK_CHECKOUT/$FALLBACK_SOURCE_CLANG_NAME"
          validate_toolchain_package "$clang_project_root" "$clang_bin"
          add_unique "$clang_dir" materialized_dirs
          if [ "$FALLBACK_REPO_SOURCE" != "metadata-checkout" ]; then
            add_unique "$clang_dir" fallback_used_dirs
          fi
          if [ "${BUILD_ENGINE:-}" = "kleaf" ]; then
            add_unique "yes" recreated_kleaf_metadata_states
          fi
          echo "clang state: materialized -> $clang_dir"
          echo "clang project root: $clang_project_root"
          echo "original clang project excluded: $original_project_excluded"
          echo "compiler source clang dir: ${fallback_dir:-$METADATA_CHECKOUT/$clang_dirname}"
          if [ "${BUILD_ENGINE:-}" = "kleaf" ]; then
            echo "materialized Kleaf metadata from manifest-matched checkout"
          fi

          "$clang_dir/bin/clang" --version | head -n 1 || true
          add_unique "$bin_dir" path_exports
        done

        if [ "${#path_exports[@]}" -eq 0 ]; then
          echo "::error::no valid Clang bin directories available after ensure step"
          exit 1
        fi

        for bin_dir in "${path_exports[@]}"; do
          echo "$bin_dir" >> "$GITHUB_PATH"
        done

        FALLBACK_CLANG_BIN=""
        FALLBACK_LLD_BIN=""
        FALLBACK_CLANG_USED="no"
        if [ -n "$FALLBACK_SOURCE_CLANG_NAME" ]; then
          if [ "$FALLBACK_REPO_SOURCE" = "metadata-checkout" ]; then
            FALLBACK_CLANG_BIN="$METADATA_CHECKOUT/${FALLBACK_SOURCE_CLANG_NAME}/bin/clang"
            FALLBACK_LLD_BIN="$METADATA_CHECKOUT/${FALLBACK_SOURCE_CLANG_NAME}/bin/ld.lld"
          else
            FALLBACK_CLANG_BIN="$FALLBACK_CHECKOUT/${FALLBACK_SOURCE_CLANG_NAME}/bin/clang"
            FALLBACK_LLD_BIN="$FALLBACK_CHECKOUT/${FALLBACK_SOURCE_CLANG_NAME}/bin/ld.lld"
          fi
        fi
        if [ "${#fallback_used_dirs[@]}" -gt 0 ]; then
          FALLBACK_CLANG_USED="yes"
        fi
        SELECTED_CLANG_BIN="${expected_bins[0]}"
        SELECTED_LLD_BIN="$(dirname "${expected_bins[0]}")/ld.lld"

        {
          echo
          echo "== ensure expected clang =="
          echo "kernel_version=${{ inputs.kernel_version }}"
          echo "build_engine=${BUILD_ENGINE:-unknown}"
          echo "metadata_repo_revision=${METADATA_REPO_REVISION:-unset}"
          echo "metadata_repo_source=${METADATA_REPO_SOURCE:-unset}"
          echo "fallback_repo_source=${FALLBACK_REPO_SOURCE:-unset}"
          echo "fallback_source_clang=${FALLBACK_SOURCE_CLANG_NAME:-unset}"
          echo "expected_dir_count=${#expected_bins[@]}"
          for clang_bin in "${expected_bins[@]}"; do
            echo "expected_dir=$(dirname "$(dirname "$clang_bin")")"
          done
          for project_root in "${expected_project_roots[@]}"; do
            echo "expected_project_root=$project_root"
          done
          for state in "${clang_project_excluded_states[@]}"; do
            echo "original_clang_project_excluded=$state"
          done
          for state in "${recreated_kleaf_metadata_states[@]}"; do
            echo "recreated_kleaf_metadata=$state"
          done
          echo "fallback_clang=$PREFERRED_FALLBACK_CLANG"
          echo "expected_clang_dir=$(basename "$(dirname "$(dirname "${expected_bins[0]}")")")"
          for dir_path in "${existing_dirs[@]}"; do
            echo "existing_dir=$dir_path"
          done
          for dir_path in "${materialized_dirs[@]}"; do
            echo "materialized_dir=$dir_path"
          done
          for dir_path in "${fallback_used_dirs[@]}"; do
            echo "fallback_clang_dir=$dir_path"
          done
          echo "fallback_clang_used=$FALLBACK_CLANG_USED"
          echo "exported_bin_dir=${path_exports[0]}"

          echo
          echo "== fallback clang --version =="
          if [ -x "$FALLBACK_CLANG_BIN" ]; then
            "$FALLBACK_CLANG_BIN" --version || true
          else
            echo "fallback clang: not materialized"
          fi

          echo
          echo "== fallback ld.lld --version =="
          if [ -x "$FALLBACK_LLD_BIN" ]; then
            "$FALLBACK_LLD_BIN" --version || true
          else
            echo "fallback ld.lld: not materialized"
          fi

          echo
          echo "== ensure-expected-clang clang --version =="
          if [ -x "$SELECTED_CLANG_BIN" ]; then
            "$SELECTED_CLANG_BIN" --version || true
          else
            echo "clang: not found"
          fi

          echo
          echo "== ensure-expected-clang ld.lld --version =="
          if [ -x "$SELECTED_LLD_BIN" ]; then
            "$SELECTED_LLD_BIN" --version || true
          else
            echo "ld.lld: not found"
          fi
        } >> "$METADATA_FILE"

        echo "== ensured clang bin dirs =="
        printf '%s\n' "${path_exports[@]}"
