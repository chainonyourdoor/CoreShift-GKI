name: Export final config
description: Export final build .config as text and gzip artifacts.
inputs:
  kernel_version:
    required: true
    description: Kernel version.
  manager:
    required: true
    description: Manager name.
  susfs:
    required: true
    description: SUSFS state.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        COMMON_REL="${KERNEL_COMMON_REL:-common}"
        COMMON_DIR="${KERNEL_COMMON_DIR:-$GITHUB_WORKSPACE/kernel/common}"
        REQUIRED="$COMMON_DIR/private.required"
        mkdir -p out

        CANDIDATES="$(mktemp)"
        {
          find kernel/out "$COMMON_DIR/out" \
            -type f \
            \( -name ".config" -o -name "*.config" -o -name "*kernel*.config" \) \
            ! -path "$COMMON_DIR/arch/arm64/configs/*" \
            ! -path "$COMMON_DIR/private.fragment" \
            ! -path "$COMMON_DIR/private.required" \
            2>/dev/null || true
        } | sort > "$CANDIDATES"

        if [ ! -s "$CANDIDATES" ]; then
          echo "::error::No final .config candidate found under kernel/out/ or $COMMON_DIR/out/."
          exit 1
        fi

        BEST=""
        BEST_SCORE="-1"

        while read -r cfg; do
          [ -f "$cfg" ] || continue
          grep -q '^CONFIG_' "$cfg" || continue

          SCORE=0

          if [ -s "$REQUIRED" ]; then
            while read -r line; do
              [ -z "$line" ] && continue
              key="${line%%=*}"

              if grep -qxF "$line" "$cfg"; then
                SCORE=$((SCORE + 2))
              elif grep -q "^${key}=" "$cfg" || grep -q "^# ${key} is not set" "$cfg"; then
                SCORE=$((SCORE + 1))
              fi
            done < "$REQUIRED"
          else
            SCORE=1
          fi

          echo "candidate score: $SCORE :: $cfg"

          if [ "$SCORE" -gt "$BEST_SCORE" ]; then
            BEST_SCORE="$SCORE"
            BEST="$cfg"
          fi
        done < "$CANDIDATES"

        if [ -z "$BEST" ]; then
          echo "::error::No usable final .config candidate found."
          exit 1
        fi

        export_suffix="${CONFIG_NAME_SUFFIX:-}"
        export_base="out/config-${{ inputs.kernel_version }}-${{ inputs.manager }}${export_suffix}"
        txt_path="${export_base}.txt"
        gz_path="${export_base}.gz"

        cp "$BEST" "$txt_path"
        gzip -c "$BEST" > "$gz_path"

        echo "== exported final config =="
        echo "source: $BEST"
        echo "text: $txt_path"
        echo "gzip: $gz_path"

        if [ -s "$REQUIRED" ]; then
          echo
          echo "== final private.required states =="
          while read -r line; do
            [ -z "$line" ] && continue
            key="${line%%=*}"
            grep -E "^${key}=|^# ${key} is not set" "$BEST" || echo "::warning::$key missing from final config"
          done < "$REQUIRED"
        else
          echo
          echo "private.required is empty; no requested config states to print"
        fi
