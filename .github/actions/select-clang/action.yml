name: Select Clang
description: Replace the synced kernel Clang prebuilts directory with a curated AOSP Clang symlink.

inputs:
  clang_version:
    required: true
    description: Curated Clang version to use, or default for the repo-synced toolchain.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        CHOICE="${{ inputs.clang_version }}"
        KERNEL_DIR="${GITHUB_WORKSPACE}/kernel"
        TOOLCHAIN_BASE="${GITHUB_WORKSPACE}/.toolchains"
        AOSP_CLANG_DIR="${TOOLCHAIN_BASE}/aosp-clang"
        COMPILER_INFO="${GITHUB_WORKSPACE}/compiler-version.txt"
        LOG_FILE="${TOOLCHAIN_BASE}/clang-override.log"
        AOSP_CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86"
        SEARCHED_ROOTS=""
        FOUND_CANDIDATES=""

        mkdir -p "$TOOLCHAIN_BASE"

        activate_clang_bin_dir() {
          local bin_dir="$1"

          echo "$bin_dir" >> "$GITHUB_PATH"
          export PATH="$bin_dir:$PATH"
        }

        print_failure_debug() {
          echo "== clang discovery debug ==" >&2
          echo "workspace=$GITHUB_WORKSPACE" >&2
          echo "searched_roots:" >&2
          if [ -n "$SEARCHED_ROOTS" ]; then
            printf '%s\n' "$SEARCHED_ROOTS" >&2
          else
            echo "(none)" >&2
          fi
          echo "found_clang_candidates:" >&2
          if [ -n "$FOUND_CANDIDATES" ]; then
            printf '%s\n' "$FOUND_CANDIDATES" >&2
          else
            echo "(none)" >&2
          fi
        }

        find_clang_root_and_target() {
          local root=""
          local candidate=""
          local candidate_dir=""
          local line=""

          for root in \
            "${GITHUB_WORKSPACE}/kernel/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/kernel/prebuilts-master/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts/clang/host/linux-x86" \
            "${GITHUB_WORKSPACE}/prebuilts-master/clang/host/linux-x86"; do
            SEARCHED_ROOTS="${SEARCHED_ROOTS}${root}"$'\n'

            if [ ! -d "$root" ]; then
              continue
            fi

            while IFS= read -r candidate; do
              [ -n "$candidate" ] || continue
              FOUND_CANDIDATES="${FOUND_CANDIDATES}${candidate}"$'\n'
            done < <(
              find "$root" -maxdepth 2 -path "$root/clang-*/bin/clang" -type f -perm -111 2>/dev/null || true
            )

            candidate="$(
              find "$root" -maxdepth 2 -path "$root/clang-*/bin/clang" -type f -perm -111 2>/dev/null | sort | head -n 1 || true
            )"
            if [ -z "$candidate" ]; then
              continue
            fi

            candidate_dir="$(dirname "$(dirname "$candidate")")"
            printf '%s\n%s\n' "$root" "$candidate_dir"
            return 0
          done

          while IFS= read -r line; do
            [ -n "$line" ] || continue
            FOUND_CANDIDATES="${FOUND_CANDIDATES}${line}"$'\n'

            if [ -n "$candidate" ]; then
              continue
            fi

            case "$line" in
              */clang-*/bin/clang)
                root="$(dirname "$(dirname "$(dirname "$line")")")"
                candidate_dir="$(dirname "$(dirname "$line")")"
                candidate="$line"
                ;;
            esac
          done < <(
            find "$GITHUB_WORKSPACE/kernel" -maxdepth 7 -type f -path "*/bin/clang" -print 2>/dev/null || true
          )

          if [ -n "$candidate" ]; then
            printf '%s\n%s\n' "$root" "$candidate_dir"
            return 0
          fi

          return 1
        }

        link_all_synced_clang_dirs() {
          local root="$1"
          local selected_dir="$2"
          local entry=""
          local linked_count=0

          [ -n "$root" ] || return 0
          [ -d "$root" ] || return 0

          while IFS= read -r entry; do
            [ -n "$entry" ] || continue
            rm -rf "$entry"
            ln -s "$selected_dir" "$entry"
            linked_count=$((linked_count + 1))
          done < <(
            find "$root" -mindepth 1 -maxdepth 1 \( -type d -o -type l \) -name 'clang-*' 2>/dev/null | sort || true
          )

          printf '%s\n' "$linked_count"
        }

        write_metadata() {
          local selection="$1"
          local clang_root="$2"
          local selected_dir="$3"
          local target_path="$4"
          local linked_count="$5"
          local clang_bin="$6"
          local lld_bin="$7"

          {
            echo "clang_selection=$selection"
            echo "clang_root=$clang_root"
            echo "selected_dir=$selected_dir"
            echo "override_target=$target_path"
            echo "linked_count=$linked_count"
            echo "clang_path=${CLANG_PATH:-}"
            echo "[command -v clang]"
            command -v clang || echo "clang: not found"
            echo
            echo "[clang --version]"
            if [ -n "$clang_bin" ] && [ -x "$clang_bin" ]; then
              "$clang_bin" --version
            else
              echo "clang: not found"
            fi
            echo
            echo "[ld.lld --version]"
            if [ -n "$lld_bin" ] && [ -x "$lld_bin" ]; then
              "$lld_bin" --version
            else
              echo "ld.lld: not found"
            fi
          } >> "$COMPILER_INFO"

          cp "$COMPILER_INFO" "$LOG_FILE"
        }

        DETECTED_PATHS=()
        if mapfile -t DETECTED_PATHS < <(find_clang_root_and_target); then
          if [ "${#DETECTED_PATHS[@]}" -lt 2 ]; then
            echo "::error::Clang discovery did not return the expected root and target"
            exit 1
          fi
          CLANG_ROOT="${DETECTED_PATHS[-2]}"
          TARGET_CLANG_DIR="${DETECTED_PATHS[-1]}"
          TARGET_CLANG_NAME="$(basename "$TARGET_CLANG_DIR")"
          ACTIVE_CLANG_DIR="$TARGET_CLANG_DIR"
        else
          CLANG_ROOT=""
          TARGET_CLANG_DIR=""
          TARGET_CLANG_NAME=""
          ACTIVE_CLANG_DIR=""
        fi

        if [ "$CHOICE" = "default" ]; then
          if [ -n "$TARGET_CLANG_DIR" ]; then
            CLANG_BIN="$TARGET_CLANG_DIR/bin/clang"
            LLD_BIN="$TARGET_CLANG_DIR/bin/ld.lld"
            SELECTED_BIN_DIR="$TARGET_CLANG_DIR/bin"

            if [ ! -x "$CLANG_BIN" ] || [ ! -x "$LLD_BIN" ]; then
              echo "::error::Detected synced Clang directory is missing expected binaries under $TARGET_CLANG_DIR"
              exit 1
            fi

            activate_clang_bin_dir "$SELECTED_BIN_DIR"
            echo "== default synced Clang =="
            echo "target_dir=$TARGET_CLANG_DIR"
          else
            CLANG_BIN="$(command -v clang || true)"
            LLD_BIN="$(command -v ld.lld || true)"

            if [ -z "$CLANG_BIN" ]; then
              echo "::error::No repo-synced clang found and clang is not available in PATH"
              exit 1
            fi

            echo "== default PATH Clang =="
            echo "target_dir=<none>"
            SELECTED_BIN_DIR="$(dirname "$CLANG_BIN")"
          fi
          echo "selected clang: default"
          echo "clang root: ${CLANG_ROOT:-<none>}"
          echo "linked synced clang dirs: 0"
          echo "clang version: $(clang --version | head -n 1 || echo not found)"

          {
            echo "CLANG_SELECTION=default"
            echo "CLANG_OVERRIDE_ROOT=$CLANG_ROOT"
            echo "CLANG_OVERRIDE_TARGET=$TARGET_CLANG_DIR"
            echo "CLANG_OVERRIDE_TARGET_NAME=$TARGET_CLANG_NAME"
            echo "CLANG_ACTIVE_DIR=$TARGET_CLANG_DIR"
            echo "CLANG_PATH=$SELECTED_BIN_DIR"
            echo "CLANG_BACKUP_DIR="
          } >> "$GITHUB_ENV"

          write_metadata "default" "$CLANG_ROOT" "$TARGET_CLANG_DIR" "$TARGET_CLANG_DIR" "0" "$CLANG_BIN" "$LLD_BIN"
          exit 0
        fi

        if [ -z "$TARGET_CLANG_DIR" ]; then
          print_failure_debug
          echo "::error::This branch/build path does not expose a repo-synced Clang directory under $GITHUB_WORKSPACE/kernel, so symlink override is unavailable."
          exit 1
        fi

        rm -rf "$AOSP_CLANG_DIR"
        git clone --depth=1 --filter=blob:none --sparse "$AOSP_CLANG_URL" "$AOSP_CLANG_DIR"
        git -C "$AOSP_CLANG_DIR" sparse-checkout set --cone "$CHOICE"

        SELECTED_CLANG_DIR="$AOSP_CLANG_DIR/$CHOICE"
        CLANG_BIN="$SELECTED_CLANG_DIR/bin/clang"
        LLD_BIN="$SELECTED_CLANG_DIR/bin/ld.lld"
        SELECTED_BIN_DIR="$SELECTED_CLANG_DIR/bin"

        if [ ! -x "$CLANG_BIN" ] || [ ! -x "$LLD_BIN" ]; then
          print_failure_debug
          echo "::error::Selected curated Clang is missing expected binaries under $SELECTED_CLANG_DIR"
          exit 1
        fi

        LINKED_COUNT="$(link_all_synced_clang_dirs "$CLANG_ROOT" "$SELECTED_CLANG_DIR")"
        if [ "$LINKED_COUNT" -eq 0 ]; then
          print_failure_debug
          echo "::error::No synced clang-* dirs found under $CLANG_ROOT"
          exit 1
        fi

        activate_clang_bin_dir "$SELECTED_BIN_DIR"

        if [ ! -x "$SELECTED_BIN_DIR/clang" ] || [ ! -x "$SELECTED_BIN_DIR/ld.lld" ]; then
          print_failure_debug
          echo "::error::Selected Clang bin dir is missing clang or ld.lld under $SELECTED_BIN_DIR"
          exit 1
        fi

        CLANG_VERSION_LINE="$("$SELECTED_BIN_DIR/clang" --version | head -n 1 || true)"
        "$SELECTED_BIN_DIR/ld.lld" --version >/dev/null

        ACTIVE_CLANG_DIR="$SELECTED_CLANG_DIR"

        echo "selected clang: $CHOICE"
        echo "clang root: $CLANG_ROOT"
        echo "linked synced clang dirs: $LINKED_COUNT"
        echo "clang version: ${CLANG_VERSION_LINE:-unknown}"

        {
          echo "CLANG_SELECTION=$CHOICE"
          echo "CLANG_OVERRIDE_ROOT=$CLANG_ROOT"
          echo "CLANG_OVERRIDE_TARGET=$TARGET_CLANG_DIR"
          echo "CLANG_OVERRIDE_TARGET_NAME=$TARGET_CLANG_NAME"
          echo "CLANG_ACTIVE_DIR=$ACTIVE_CLANG_DIR"
          echo "CLANG_PATH=$SELECTED_BIN_DIR"
          echo "CLANG_BACKUP_DIR="
        } >> "$GITHUB_ENV"

        write_metadata "$CHOICE" "$CLANG_ROOT" "$SELECTED_CLANG_DIR" "$TARGET_CLANG_DIR" "$LINKED_COUNT" "$SELECTED_BIN_DIR/clang" "$SELECTED_BIN_DIR/ld.lld"
