name: Generate legacy private defconfig
description: Generate 5.10 coreshift_gki_defconfig from gki_defconfig plus private.fragment.
inputs:
  strict_config:
    required: true
    description: Kept for workflow compatibility; final config enforcement happens after build.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        ROOT_DIR="$GITHUB_WORKSPACE"
        KERNEL_DIR="$ROOT_DIR/kernel"
        COMMON_DIR="$KERNEL_DIR/common"
        CONFIG_DIR="$COMMON_DIR/arch/arm64/configs"
        BASE_DEFCONFIG="$CONFIG_DIR/gki_defconfig"
        CORESHIFT_DEFCONFIG="$CONFIG_DIR/coreshift_gki_defconfig"
        FRAGMENT="$COMMON_DIR/private.fragment"
        WRAPPER_CONFIG="$COMMON_DIR/build.config.coreshift.gki.aarch64"
        MARKER="# CoreShift private config fragment"

        cd "$KERNEL_DIR"

        if [ ! -f "$BASE_DEFCONFIG" ]; then
          echo "::error::missing base defconfig: $BASE_DEFCONFIG"
          exit 1
        fi

        if [ ! -f "$FRAGMENT" ]; then
          echo "::error::missing private.fragment: $FRAGMENT"
          exit 1
        fi

        before_base_sha="$(sha256sum "$BASE_DEFCONFIG" | awk '{print $1}')"

        cp "$BASE_DEFCONFIG" "$CORESHIFT_DEFCONFIG"
        effective_fragment="$(mktemp)"

        awk '
          function config_key(line) {
            if (line ~ /^CONFIG_[A-Za-z0-9_]+=/) {
              sub(/=.*/, "", line)
              return line
            }
            if (line ~ /^# CONFIG_[A-Za-z0-9_]+ is not set$/) {
              sub(/^# /, "", line)
              sub(/ is not set$/, "", line)
              return line
            }
            return ""
          }

          {
            key = config_key($0)
            if (key == "") {
              next
            }
            if (!(key in seen)) {
              order[++count] = key
              seen[key] = 1
            }
            value[key] = $0
          }

          END {
            for (i = 1; i <= count; i++) {
              print value[order[i]]
            }
          }
        ' "$FRAGMENT" > "$effective_fragment"

        if [ -s "$effective_fragment" ]; then
          while IFS= read -r line; do
            if [[ "$line" == CONFIG_*=* ]]; then
              key="${line%%=*}"
            else
              key="${line#"# "}"
              key="${key%" is not set"}"
            fi

            if ! [[ "$key" =~ ^CONFIG_[A-Za-z0-9_]+$ ]]; then
              echo "::error::invalid CONFIG key in private.fragment: $line"
              exit 1
            fi

            sed -i -E "/^${key}=|^# ${key} is not set$/d" "$CORESHIFT_DEFCONFIG"
          done < "$effective_fragment"

          {
            printf '\n%s\n' "$MARKER"
            while IFS= read -r line; do
              printf '%s\n' "$line"
            done < "$effective_fragment"
          } >> "$CORESHIFT_DEFCONFIG"
        fi

        after_base_sha="$(sha256sum "$BASE_DEFCONFIG" | awk '{print $1}')"
        if [ "$before_base_sha" != "$after_base_sha" ]; then
          echo "::error::common/arch/arm64/configs/gki_defconfig changed during CoreShift defconfig generation"
          exit 1
        fi

        if ! git -C "$COMMON_DIR" diff --exit-code -- arch/arm64/configs/gki_defconfig; then
          echo "::error::common/arch/arm64/configs/gki_defconfig changed; private.fragment must apply only to coreshift_gki_defconfig"
          exit 1
        fi

        uses_gki_fragment="no"
        if grep -qs 'GKI_DEFCONFIG_FRAGMENT' build/build.sh "$COMMON_DIR/build.config.gki.aarch64" 2>/dev/null; then
          uses_gki_fragment="yes"
        fi

        {
          printf '# Generated by CoreShift workflow for legacy 5.10 builds.\n'
          printf '. "${ROOT_DIR:-$(pwd)}/common/build.config.gki.aarch64"\n'
          printf 'export DEFCONFIG=coreshift_gki_defconfig\n'
          if [ "$uses_gki_fragment" = "yes" ]; then
            printf 'export GKI_DEFCONFIG_FRAGMENT=common/private.fragment\n'
          fi
        } > "$WRAPPER_CONFIG"

        echo "== legacy CoreShift defconfig generation =="
        echo "base defconfig: common/arch/arm64/configs/gki_defconfig"
        echo "generated defconfig: common/arch/arm64/configs/coreshift_gki_defconfig"
        echo "private.fragment: common/private.fragment"
        echo "wrapper BUILD_CONFIG: common/build.config.coreshift.gki.aarch64"
        echo "DEFCONFIG=coreshift_gki_defconfig"
        if [ "$uses_gki_fragment" = "yes" ]; then
          echo "GKI_DEFCONFIG_FRAGMENT=common/private.fragment"
        else
          echo "GKI_DEFCONFIG_FRAGMENT: not used by legacy build scripts"
        fi

        echo
        echo "== private.fragment =="
        cat "$FRAGMENT"

        echo
        echo "== effective private.fragment for coreshift_gki_defconfig =="
        cat "$effective_fragment"

        echo
        echo "== CONFIG-only diff: gki_defconfig -> coreshift_gki_defconfig =="
        old_cfg="$(mktemp)"
        new_cfg="$(mktemp)"
        grep -E '^(CONFIG_|# CONFIG_.* is not set$)' "$BASE_DEFCONFIG" > "$old_cfg" || true
        grep -E '^(CONFIG_|# CONFIG_.* is not set$)' "$CORESHIFT_DEFCONFIG" > "$new_cfg" || true
        diff -u "$old_cfg" "$new_cfg" || true

        echo
        echo "== wrapper build config =="
        cat "$WRAPPER_CONFIG"
