name: Install legacy private fragment build config
description: Configure 5.10 build.sh to merge private.fragment through PRE_DEFCONFIG_CMDS without replacing existing build fragments.
inputs:
  strict_config:
    required: true
    description: Kept for workflow compatibility; final config enforcement happens after build.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        ROOT_DIR="$GITHUB_WORKSPACE"
        KERNEL_DIR="$ROOT_DIR/kernel"
        COMMON_DIR="$KERNEL_DIR/common"
        CONFIG_DIR="$COMMON_DIR/arch/arm64/configs"
        BASE_DEFCONFIG="$CONFIG_DIR/gki_defconfig"
        FRAGMENT="$COMMON_DIR/private.fragment"
        WRAPPER_CONFIG="$COMMON_DIR/build.config.coreshift.gki.aarch64"

        cd "$KERNEL_DIR"

        if [ ! -f "$BASE_DEFCONFIG" ]; then
          echo "::error::missing base defconfig: $BASE_DEFCONFIG"
          exit 1
        fi

        if [ ! -f "$FRAGMENT" ]; then
          echo "::error::missing private.fragment: $FRAGMENT"
          exit 1
        fi

        before_base_sha="$(sha256sum "$BASE_DEFCONFIG" | awk '{print $1}')"

        cat > "$WRAPPER_CONFIG" <<'WRAPPER_EOF'
        # Generated by CoreShift workflow for legacy 5.10 builds.
        . "${ROOT_DIR:-$(pwd)}/common/build.config.gki.aarch64"

        # Preserve whatever the sourced build config selected, including any
        # GKI_DEFCONFIG_FRAGMENT-sourced PRE/POST defconfig commands, then add the
        # CoreShift private Kconfig fragment as one more merge step.
        CORESHIFT_BASE_DEFCONFIG="${DEFCONFIG:-gki_defconfig}"
        CORESHIFT_DEFCONFIG="coreshift_${CORESHIFT_BASE_DEFCONFIG}"
        CORESHIFT_CONFIG_DIR="${ROOT_DIR:-$(pwd)}/common/arch/arm64/configs"
        CORESHIFT_MERGE_CONFIG="${ROOT_DIR:-$(pwd)}/common/scripts/kconfig/merge_config.sh"
        CORESHIFT_PRIVATE_FRAGMENT="${ROOT_DIR:-$(pwd)}/common/private.fragment"
        CORESHIFT_TEMP_DEFCONFIG="${CORESHIFT_CONFIG_DIR}/${CORESHIFT_DEFCONFIG}"
        CORESHIFT_BASE_DEFCONFIG_PATH="${CORESHIFT_CONFIG_DIR}/${CORESHIFT_BASE_DEFCONFIG}"

        CORESHIFT_PRE_DEFCONFIG_CMDS="KCONFIG_CONFIG=${CORESHIFT_TEMP_DEFCONFIG} ${CORESHIFT_MERGE_CONFIG} -m -r ${CORESHIFT_BASE_DEFCONFIG_PATH} ${CORESHIFT_PRIVATE_FRAGMENT}"
        if [ -n "${PRE_DEFCONFIG_CMDS:-}" ]; then
          PRE_DEFCONFIG_CMDS="${PRE_DEFCONFIG_CMDS} && ${CORESHIFT_PRE_DEFCONFIG_CMDS}"
        else
          PRE_DEFCONFIG_CMDS="${CORESHIFT_PRE_DEFCONFIG_CMDS}"
        fi

        CORESHIFT_POST_DEFCONFIG_CMDS="rm -f ${CORESHIFT_TEMP_DEFCONFIG}"
        if [ -n "${POST_DEFCONFIG_CMDS:-}" ]; then
          POST_DEFCONFIG_CMDS="${POST_DEFCONFIG_CMDS} && ${CORESHIFT_POST_DEFCONFIG_CMDS}"
        else
          POST_DEFCONFIG_CMDS="${CORESHIFT_POST_DEFCONFIG_CMDS}"
        fi

        DEFCONFIG="${CORESHIFT_DEFCONFIG}"
        WRAPPER_EOF

        after_base_sha="$(sha256sum "$BASE_DEFCONFIG" | awk '{print $1}')"
        if [ "$before_base_sha" != "$after_base_sha" ]; then
          echo "::error::common/arch/arm64/configs/gki_defconfig changed during CoreShift build config generation"
          exit 1
        fi

        if ! git -C "$COMMON_DIR" diff --exit-code -- arch/arm64/configs/gki_defconfig; then
          echo "::error::common/arch/arm64/configs/gki_defconfig changed; private.fragment must be merged by build.sh only"
          exit 1
        fi

        echo "== legacy CoreShift build config generation =="
        echo "base build config: common/build.config.gki.aarch64"
        echo "wrapper BUILD_CONFIG: common/build.config.coreshift.gki.aarch64"
        echo "base defconfig: common/arch/arm64/configs/gki_defconfig"
        echo "private.fragment: common/private.fragment"
        echo "merge path: existing PRE_DEFCONFIG_CMDS first, then CoreShift private.fragment"

        echo
        echo "== private.fragment =="
        cat "$FRAGMENT"

        echo
        echo "== wrapper build config =="
        cat "$WRAPPER_CONFIG"
